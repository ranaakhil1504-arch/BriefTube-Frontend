name: Build, Prerender & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # This is the actual fix: Vercel's build container is missing
      # these libraries, which is why Chromium failed with
      # "libnss3.so: cannot open shared object file". A regular Ubuntu
      # runner lets us install them directly.
      - name: Install system libraries required by Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpangocairo-1.0-0 \
            libasound2t64

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install project dependencies
        run: npm ci

      # Pulls your project's settings/env vars from Vercel so the
      # local build behaves the same as it would on Vercel's servers.
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Runs your normal `npm run build` (sitemap + typecheck + vite
      # build + prerender) right here on this runner, where Chromium
      # actually has the libraries it needs.
      - name: Build project (includes sitemap + prerender)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Uploads the already-built output directly — Vercel's own
      # servers never run a build, so they never touch Chromium at all.
      - name: Deploy prebuilt output to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
